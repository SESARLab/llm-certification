apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
spec:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
  containers:
  - name: probe
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Running security probe with configured parameters"
        # Simulate probe execution with mounted secrets and env vars
        sleep 300
    env:
      - name: PROBE_TIMEOUT
        value: "30"
      - name: PROBE_TARGET
        value: "localhost"
      - name: PROBE_PORT
        value: "443"
      - name: PROBE_PROTOCOL
        value: "https"
    envFrom:
      - secretRef:
          name: probe-credentials
    volumeMounts:
      - name: probe-config
        mountPath: /etc/probe/config
        readOnly: true
      - name: probe-secrets
        mountPath: /etc/probe/secrets
        readOnly: true
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  volumes:
    - name: probe-config
      configMap:
        name: probe-config
    - name: probe-secrets
      secret:
        secretName: probe-credentials
        items:
          - key: username
            path: credentials/username
          - key: password
            path: credentials/password
  restartPolicy: Never