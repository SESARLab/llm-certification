apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 3000
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
  containers:
  - name: security-probe
    image: quay.io/security/probe:latest
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      capabilities:
        drop:
          - ALL
    env:
    - name: TARGET_HOST
      value: "example.com"
    - name: PROBE_TIMEOUT
      value: "30"
    - name: PROBE_INTERVAL
      value: "60"
    - name: LOG_LEVEL
      value: "info"
    - name: ENABLE_SSL_VERIFY
      value: "true"
    volumeMounts:
    - name: credentials
      mountPath: /etc/credentials
      readOnly: true
    - name: config
      mountPath: /etc/config
      readOnly: true
  volumes:
  - name: credentials
    secret:
      secretName: probe-credentials
      defaultMode: 256
  - name: config
    configMap:
      name: probe-config
      defaultMode: 256
  automountServiceAccountToken: false
  hostNetwork: false
  hostPID: false
  hostIPC: false
  restartPolicy: Never