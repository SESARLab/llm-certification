apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 3000
    supplementalGroups: [4000]
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
      add:
        - NET_RAW
  containers:
  - name: security-probe
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Starting security probe with configured settings";
        # Probe execution would go here
        sleep 3600
    env:
      - name: PROBE_TIMEOUT
        value: "30"
      - name: PROBE_INTERVAL
        value: "60"
      - name: PROBE_TARGET
        value: "localhost"
      - name: PROBE_VERBOSE
        value: "true"
    envFrom:
      - secretRef:
          name: probe-credentials
    volumeMounts:
      - name: probe-config
        mountPath: /etc/probe/config
        readOnly: true
      - name: probe-secrets
        mountPath: /etc/probe/secrets
        readOnly: true
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 2001
      capabilities:
        drop:
          - ALL
  volumes:
    - name: probe-config
      configMap:
        name: probe-config
    - name: probe-secrets
      secret:
        secretName: probe-secrets
  restartPolicy: Never
  automountServiceAccountToken: false