apiVersion: v1
kind: Pod
metadata:
  name: security-probe-pod
  labels:
    app: security-probe
    security: hardened
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 3000
    supplementalGroups: [4000]
    sysctls:
    - name: net.ipv4.ip_unprivileged_port_start
      value: "0"
    - name: kernel.randomize_va_space
      value: "2"
  containers:
  - name: security-probe
    image: ubuntu:20.04
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      apt-get update && apt-get install -y nmap curl openssh-client && \
      echo "Security probe container running with hardened configuration"
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      capabilities:
        drop:
        - ALL
        add:
        - NET_RAW
      seccompProfile:
        type: RuntimeDefault
      appArmorProfile: runtime/default
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: var-log
      mountPath: /var/log
    - name: etc-ssl-certs
      mountPath: /etc/ssl/certs
      readOnly: true
  volumes:
  - name: tmp
    emptyDir:
      medium: Memory
      sizeLimit: 10Mi
  - name: var-log
    emptyDir:
      medium: Memory
      sizeLimit: 50Mi
  - name: etc-ssl-certs
    hostPath:
      path: /etc/ssl/certs
      type: Directory
  hostNetwork: false
  hostPID: false
  hostIPC: false
  dnsPolicy: ClusterFirst
  restartPolicy: Never
  automountServiceAccountToken: false
  enableServiceLinks: false
  terminationGracePeriodSeconds: 30
  priorityClassName: "system-node-critical"
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"