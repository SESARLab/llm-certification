apiVersion: v1
kind: Pod
metadata:
  name: security-probe-pod
  labels:
    app: security-probe
    security: hardened
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 3000
    supplementalGroups: [4000]
    sysctls:
    - name: net.ipv4.ip_unprivileged_port_start
      value: "0"
    - name: kernel.randomize_va_space
      value: "2"
  containers:
  - name: security-probe
    image: alpine:latest
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
    - |
      apk add --no-cache curl;
      while true; do
        echo "Running security probe...";
        sleep 300;
      done
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      capabilities:
        drop:
        - ALL
        add:
        - NET_RAW
      seccompProfile:
        type: RuntimeDefault
      appArmorProfile: runtime/default
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: var-log
      mountPath: /var/log
  volumes:
  - name: tmp
    emptyDir:
      medium: Memory
      sizeLimit: 10Mi
  - name: var-log
    emptyDir:
      medium: Memory
      sizeLimit: 50Mi
  hostNetwork: false
  hostPID: false
  hostIPC: false
  dnsPolicy: "Default"
  restartPolicy: Always
  automountServiceAccountToken: false
  enableServiceLinks: false
  terminationGracePeriodSeconds: 30