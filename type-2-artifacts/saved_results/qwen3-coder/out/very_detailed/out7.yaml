apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
spec:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    supplementalGroups: [4000]
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  containers:
  - name: security-probe
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Running security probe with configured parameters";
        # Probe execution would go here
        sleep 3600
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 3000
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    env:
      - name: PROBE_TIMEOUT
        value: "30"
      - name: PROBE_INTERVAL
        value: "60"
      - name: PROBE_TARGET
        value: "localhost"
      - name: PROBE_VERBOSE
        value: "true"
    envFrom:
      - secretRef:
          name: probe-credentials
    volumeMounts:
      - name: config-volume
        mountPath: /etc/probe/config
        readOnly: true
      - name: probe-results
        mountPath: /var/lib/probe/results
        readOnly: false
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
  volumes:
    - name: config-volume
      configMap:
        name: probe-config
    - name: probe-results
      emptyDir: {}
  restartPolicy: Never