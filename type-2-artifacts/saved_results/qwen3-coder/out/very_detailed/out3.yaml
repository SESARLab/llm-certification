apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
spec:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    supplementalGroups: [4000]
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
  containers:
  - name: security-probe
    image: my-security-probe:latest
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 3000
      capabilities:
        drop:
          - ALL
      allowPrivilegeEscalation: false
      privileged: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
    env:
    - name: PROBE_TARGET
      value: "example.com"
    - name: PROBE_TIMEOUT
      value: "30"
    - name: PROBE_PORT
      value: "443"
    - name: PROBE_PROTOCOL
      value: "https"
    - name: PROBE_INTERVAL
      value: "60"
    - name: PROBE_VERBOSE
      value: "true"
    envFrom:
    - secretRef:
        name: probe-credentials
        optional: false
    volumeMounts:
    - name: config-volume
      mountPath: /etc/probe/config
      readOnly: true
    - name: probe-results
      mountPath: /var/lib/probe/results
      readOnly: false
    - name: tmp
      mountPath: /tmp
      readOnly: false
  volumes:
  - name: config-volume
    configMap:
      name: probe-config
      optional: false
  - name: probe-results
    emptyDir: {}
  - name: tmp
    emptyDir: {}
  hostNetwork: false
  hostPID: false
  hostIPC: false
  dnsPolicy: "Default"
  restartPolicy: "Never"