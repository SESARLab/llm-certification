apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 3000
    supplementalGroups: [4000]
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
  containers:
  - name: security-probe
    image: security/probe:latest
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
    env:
    - name: PROBE_TIMEOUT
      value: "30"
    - name: PROBE_TARGET
      value: "localhost"
    - name: PROBE_PORT
      value: "443"
    - name: PROBE_PROTOCOL
      value: "https"
    - name: LOG_LEVEL
      value: "info"
    - name: MAX_RETRIES
      value: "3"
    - name: PROBE_INTERVAL
      value: "60"
    - name: ENABLE_SSL_VERIFY
      value: "true"
    - name: PROBE_TIMEOUT
      value: "30"
    - name: OUTPUT_FORMAT
      value: "json"
    volumeMounts:
    - name: credentials
      mountPath: /etc/credentials
      readOnly: true
    - name: config
      mountPath: /etc/config
      readOnly: true
    - name: probe-results
      mountPath: /results
      readOnly: false
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    ports:
    - containerPort: 8080
      protocol: TCP
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
  volumes:
  - name: credentials
    secret:
      secretName: probe-credentials
      defaultMode: 256
  - name: config
    configMap:
      name: probe-config
      defaultMode: 256
  - name: probe-results
    emptyDir:
      medium: Memory
  restartPolicy: Never
  hostNetwork: false
  hostPID: false
  hostIPC: false
  dnsPolicy: ClusterFirst
  imagePullSecrets:
  - name: registry-credentials