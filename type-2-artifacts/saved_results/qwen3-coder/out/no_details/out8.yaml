apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
    tier: security
spec:
  containers:
  - name: probe-container
    image: busybox:1.35
    command:
    - /bin/sh
    - -c
    - |
      echo "Running security probe..."
      # Security checks
      whoami
      id
      ls -la /etc
      cat /etc/passwd | grep root
      echo "Security probe completed"
    securityContext:
      runAsUser: 1000
      runAsGroup: 3000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000