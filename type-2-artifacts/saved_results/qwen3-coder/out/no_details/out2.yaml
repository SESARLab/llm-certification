apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
    tier: security
spec:
  containers:
  - name: probe-container
    image: busybox:latest
    command: ['sh', '-c']
    args:
    - |
      echo "Running security probe...";
      # Add security checks here
      echo "Probe completed successfully";
      sleep 3600;
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000