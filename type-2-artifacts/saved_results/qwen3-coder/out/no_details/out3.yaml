apiVersion: v1
kind: Pod
metadata:
  name: security-probe
  labels:
    app: security-probe
    tier: security
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: probe-container
    image: busybox:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Running security probe...";
        # Add your security checks here
        exit 0
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    volumeMounts:
      - name: tmp
        mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
  restartPolicy: Never